<!DOCTYPE html>
<html>
<body>
    <div id="ui">
        <button onclick="el='sand'">Sand</button>
        <button onclick="el='water'">Water</button>
        <button onclick="el='acid'">Acid</button>
        <span id="display"></span>
    </div>
    <canvas id="canvas" width="200" height="200" style="border:1px solid #000; image-rendering: pixelated; width: 400px; height: 400px;"></canvas>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const W = 200, H = 200;
        let grid = Array(W * H).fill(0); // 0: air, 1: sand, 2: water, 3: acid
        let el = 'sand';
        let peer = new Peer();
        let conn;

        // Set up the room
        peer.on('open', (id) => document.getElementById('display').innerText = "ID: " + id);
        peer.on('connection', (c) => { conn = c; setupConn(); });

        function setupConn() {
            conn.on('data', (d) => grid[d.idx] = d.type);
        }

        canvas.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) {
                let idx = Math.floor(e.offsetX / 2) + Math.floor(e.offsetY / 2) * W;
                let type = el === 'sand' ? 1 : el === 'water' ? 2 : 3;
                grid[idx] = type;
                if (conn && conn.open) conn.send({idx, type});
            }
        });

        function update() {
            let next = [...grid];
            for (let i = 0; i < grid.length; i++) {
                let x = i % W, y = Math.floor(i / W);
                if (grid[i] === 0) continue;

                // Simple Physics Rules
                let below = i + W;
                if (y < H - 1) {
                    if (grid[below] === 0) { // Fall
                        next[below] = grid[i];
                        next[i] = 0;
                    } else if (grid[i] === 2 && (grid[i+1] === 0 || grid[i-1] === 0)) { // Water flows side
                        let dir = Math.random() > 0.5 ? 1 : -1;
                        if (grid[i+dir] === 0) { next[i+dir] = 2; next[i] = 0; }
                    } else if (grid[i] === 3 && grid[below] !== 0 && grid[below] !== 3) { // Acid destroys
                        next[below] = 0;
                    }
                }
            }
            grid = next;
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            let img = ctx.createImageData(W, H);
            for (let i = 0; i < grid.length; i++) {
                let col = 0, 200, 50, 255; // Colors: air, sand, water, acid
                img.data[i*4] = grid[i] === 1 ? 200 : grid[i] === 2 ? 0 : 255;
                img.data[i*4+1] = grid[i] === 1 ? 150 : grid[i] === 2 ? 0 : 0;
                img.data[i*4+2] = grid[i] === 1 ? 50 : grid[i] === 2 ? 255 : 0;
                img.data[i*4+3] = grid[i] ? 255 : 0;
            }
            ctx.putImageData(img, 0, 0);
        }

        update();
    </script>
</body>
</html>
