<!DOCTYPE html>
<html>
<body>
    <div id="ui">
        <input type="text" id="roomId" placeholder="Enter Room Name">
        <button onclick="hostRoom()">Create Room</button>
        <button onclick="joinRoom()">Join Room</button>
        <p>Status: <span id="status">Disconnected</span></p>
        <button onclick="el='sand'">Sand</button>
        <button onclick="el='water'">Water</button>
    </div>
    <canvas id="canvas" width="200" height="200" style="border:1px solid #000; image-rendering: pixelated; width: 400px; height: 400px;"></canvas>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const W = 200, H = 200;
        let grid = Array(W * H).fill(0);
        let el = 'sand';
        let peer, conn;

        function hostRoom() {
            const id = document.getElementById('roomId').value;
            peer = new Peer(id);
            peer.on('open', () => document.getElementById('status').innerText = "Hosting: " + id);
            peer.on('connection', (c) => { conn = c; setupConn(); document.getElementById('status').innerText = "Connected!"; });
        }

        function joinRoom() {
            const id = document.getElementById('roomId').value;
            peer = new Peer();
            peer.on('open', () => {
                conn = peer.connect(id);
                setupConn();
                document.getElementById('status').innerText = "Connected to " + id;
            });
        }

        function setupConn() {
            conn.on('data', (d) => grid[d.idx] = d.type);
        }

        canvas.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) {
                let idx = Math.floor(e.offsetX / 2) + Math.floor(e.offsetY / 2) * W;
                let type = el === 'sand' ? 1 : 2;
                grid[idx] = type;
                if (conn && conn.open) conn.send({idx, type});
            }
        });

        function update() {
            let next = [...grid];
            for (let i = 0; i < grid.length; i++) {
                if (grid[i] === 0) continue;
                let below = i + W;
                if (below < grid.length && next[below] === 0) {
                    next[below] = grid[i];
                    next[i] = 0;
                }
            }
            grid = next;
            draw();
            requestAnimationFrame(update);
        }

        function draw() {
            let img = ctx.createImageData(W, H);
            for (let i = 0; i < grid.length; i++) {
                if (grid[i] > 0) {
                    img.data[i*4] = grid[i] === 1 ? 200 : 0;
                    img.data[i*4+1] = 150;
                    img.data[i*4+2] = grid[i] === 1 ? 50 : 255;
                    img.data[i*4+3] = 255;
                }
            }
            ctx.putImageData(img, 0, 0);
        }
        update();
    </script>
</body>
</html>
